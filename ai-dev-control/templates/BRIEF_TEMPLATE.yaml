# BRIEF TEMPLATE
# Schema: schemas/brief.schema.yaml v1.0
# Copy this file, fill all fields, store at: docs/briefs/{DC}_BRIEF_{DATE}.yaml

schema_version: "1.0"
dc_identifier: DC-XX-XXX
title: "[Short title]"
date: YYYY-MM-DD
workstream: "[WS identifier and name]"
priority: P1                     # P1 | P2 | P3
owner: "[name]"
prerequisite: NONE               # DC identifier or NONE
risk_level: LOW                  # LOW | MEDIUM | HIGH
systems_affected: 0

problem:
  root_cause: >
    [Measured, not estimated. One sentence stating root cause.]
  metrics:
    - metric: "[metric name]"
      value: "[value]"
      source: "[where measured and when]"
  rationale: >
    [Prose context — why this matters. Keep to 2–4 sentences.]

autonomous_authority:
  may_proceed:
    - All read-only shell commands (grep, cat, ls, git log, git diff, --help flags)
    - SELECT queries against local DB
    - Reading any file in the repository
    - "[Add task-specific autonomous actions]"
  must_checkpoint:
    - Any remote sync or push
    - Any database write or migration
    - Any action not described in this brief
    - "[Add task-specific checkpoint triggers]"

phases:
  - id: 1
    name: "[Phase name]"
    task: >
      [What to do — specific enough to execute without clarification.]
    output:
      type: FILE                 # FILE | QUERY_RESULT | MEASUREMENT | DOCUMENT | CODE_CHANGE
      path: null                 # repo-relative path or null
      description: "[What the output contains.]"
    validation_gate: >
      [How to confirm this phase is correct before next phase starts.]

  - id: 2
    name: "[Phase name]"
    task: >
      [What to do.]
    output:
      type: MEASUREMENT
      path: null
      description: "[What the output contains.]"
    validation_gate: >
      [Confirmation step.]

  - id: 3
    name: Verification
    task: >
      Run verification sequence. Confirm all success criteria are met.
      Produce self-check results.
    output:
      type: MEASUREMENT
      path: null
      description: Measurement results confirming success criteria.
    validation_gate: All success criteria confirmed before marking complete.

do_not:
  - "[Most plausible wrong action for this specific task]"
  - "[Second most plausible wrong action]"
  - Do not apply changes to remote until local validation passes
  - "[Scope creep this brief is most likely to attract]"

verification:
  commands:
    - step: 1
      command: "[command]"
      purpose: "[what this confirms]"
    - step: 2
      command: "[command]"
      purpose: "[what this confirms]"
  expected_outcomes:
    - "[Measurable expected result 1]"
    - "[Measurable expected result 2]"

success_criteria:
  - id: 1
    description: "[Measurable outcome]"
    measurable: true
  - id: 2
    description: "[Measurable outcome]"
    measurable: true

self_check:
  - item: "[Specific check]"
    verification_method: "[How to confirm — command, query, file diff, etc.]"
  - item: Wave tracker updated
    verification_method: Read tracker file and confirm DC status updated
  - item: Handoff artifact produced if handing to another agent
    verification_method: Confirm file exists at docs/handoffs/

change_impact:
  systems:
    - name: "[System name]"
      impact: NOT_AFFECTED       # IMPACTED | INDIRECTLY_AFFECTED | NOT_AFFECTED
      description: "[What specifically changes, or why not affected.]"
  regression_risk: >
    [What existing behaviour might be affected and how to check.]

out_of_scope:
  - "[Explicit deferred or excluded item]"

output_documents:
  - description: "[Document description]"
    path: "[repo-relative path]"

handoff:
  produces_artifact: true
  to_role: HUMAN                 # CTO | DEV | PM | REVIEWER | HUMAN
  tracker_update:
    file: docs/control/WAVE_TRACKER.md
    dc_identifier: DC-XX-XXX
    on_complete: COMPLETE        # COMPLETE | IN_PROGRESS | BLOCKED
